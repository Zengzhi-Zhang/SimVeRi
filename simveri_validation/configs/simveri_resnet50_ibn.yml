_BASE_: "Base-bagtricks.yml"

MODEL:
  META_ARCHITECTURE: "Baseline"
  
  BACKBONE:
    NAME: "build_resnet_backbone"
    DEPTH: "50x"
    WITH_IBN: True
    PRETRAIN: True
    PRETRAIN_PATH: ""
  
  HEADS:
    NAME: "EmbeddingHead"
    NORM: "BN"
    WITH_BNNECK: True
    POOL_LAYER: "GlobalAvgPool"
    NECK_FEAT: "after"
    CLS_LAYER: "Linear"
    EMBEDDING_DIM: 0
    NUM_CLASSES: 530

  LOSSES:
    NAME: ("CrossEntropyLoss", "TripletLoss")
    
    CE:
      EPSILON: 0.1
      SCALE: 1.0
    
    TRI:
      MARGIN: 0.3
      HARD_MINING: True
      NORM_FEAT: False
      SCALE: 1.0

INPUT:
  SIZE_TRAIN: [256, 256]
  SIZE_TEST: [256, 256]
  
  DO_AUTOAUG: False
  DO_FLIP: True
  DO_PAD: True
  PADDING: 10
  
  REA:
    ENABLED: True
    PROB: 0.5
    MEAN: [123.675, 116.28, 103.53]

DATALOADER:
  SAMPLER_TRAIN: "NaiveIdentitySampler"
  NUM_INSTANCE: 4
  NUM_WORKERS: 4

SOLVER:
  OPT: "Adam"
  
  MAX_EPOCH: 60
  BASE_LR: 0.00035
  BIAS_LR_FACTOR: 1.0
  
  WEIGHT_DECAY: 0.0005
  WEIGHT_DECAY_BIAS: 0.0005
  
  IMS_PER_BATCH: 64
  
  SCHED: "WarmupMultiStepLR"
  STEPS: [30, 50]
  GAMMA: 0.1
  
  WARMUP_FACTOR: 0.01
  WARMUP_ITERS: 500
  WARMUP_METHOD: "linear"
  
  CHECKPOINT_PERIOD: 10
  LOG_PERIOD: 50
  EVAL_PERIOD: 10

TEST:
  EVAL_PERIOD: 10
  IMS_PER_BATCH: 128
  
  METRIC: "cosine"
  
  ROC:
    ENABLED: False

OUTPUT_DIR: "outputs/models/simveri_baseline"