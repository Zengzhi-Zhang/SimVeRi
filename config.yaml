simulation:
  carla_version: "0.9.13"
  map: "Town05"
  synchronous_mode: true
  fixed_delta_seconds: 0.0333
  weather: "ClearNoon"
  weather_params:
    cloudiness: 5.0
    precipitation: 0.0
    wind_intensity: 5.0
    sun_azimuth_angle: 45.0
    sun_altitude_angle: 45.0
    fog_density: 0.0
    wetness: 0.0

camera:
  count: 30
  resolution:
    width: 2560
    height: 1440
  fov: 90
  sensor_type: "sensor.camera.rgb"
  topology_file: "camera_topology.json"

acquisition:
  physics_fps: 30
  sampling_fps: 6
  sampling_interval: 5
  image_format: "jpg"
  image_quality: 98
  occlusion_threshold: 0.75
  min_bbox_area: 9216
  min_bbox_width: 96
  min_bbox_height: 96
  max_images_per_track: 80
  min_motion_delta: 1.0
  bbox_padding: 0.01
  near_distance: 7.0
  far_distance: 75.0
  per_camera_overrides:
    c025:
      min_bbox_area: 4096
      min_bbox_width: 64
      min_bbox_height: 64
      far_distance: 120.0
    c026:
      min_bbox_area: 4096
      min_bbox_width: 64
      min_bbox_height: 64
      far_distance: 120.0
    c027:
      min_bbox_area: 4096
      min_bbox_width: 64
      min_bbox_height: 64
      far_distance: 120.0
    c028:
      min_bbox_area: 4096
      min_bbox_width: 64
      min_bbox_height: 64
      far_distance: 120.0
    c029:
      min_bbox_area: 4096
      min_bbox_width: 64
      min_bbox_height: 64
      far_distance: 120.0
    c030:
      min_bbox_area: 4096
      min_bbox_width: 64
      min_bbox_height: 64
      far_distance: 120.0

dataset:
  name: "SimVeRi"
  root: "."
  subsets:
    base:
      count: 600
    hard:
      fleets: 25
      vehicles_per_fleet: 5
    occ:
      count: 50

traffic:
  spawn:
    vehicles_per_batch: 100
    spawn_interval: 2.0
  vehicle_blueprints:
